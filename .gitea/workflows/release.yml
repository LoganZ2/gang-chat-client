name: release

# 流程：prepare（建 draft release）→ build-macos & build-windows（并行构建，直接上传产物）→ release（发布）
# 全程不依赖任何外部 action，仅用 git / curl 原生工具。
# 触发方式：push v* tag，或 Actions 页面手动触发。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，例如 1.2.0）'
        required: true

jobs:
  prepare:
    runs-on: macos-arm64
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.release.outputs.release_id }}
      duplicate: ${{ steps.release.outputs.duplicate }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then echo "version is empty"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create draft release
        id: release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          TAG="${{ steps.version.outputs.tag }}"
          [ -n "$TOKEN" ] || { echo "TOKEN is empty"; exit 1; }

          # 抓第一个 "id":<n>（release id 在响应体最前面，author.id 在其后）。
          # 不做整体 JSON 解析：上游代理曾把响应体的 author 段改坏（"author";:{...），
          # 整体解析会失败；正则只认开头的 id，对这种损坏免疫。
          extract_id() { grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]\+' | head -1 | grep -o '[0-9]\+'; }

          # -w 追加 HTTP 状态码，不用 -f 以便错误体也可见。
          BODY="$(curl -sS -w $'\nHTTP_CODE:%{http_code}' -X POST "$API/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${GITHUB_SHA}\",\"name\":\"$TAG\",\"draft\":true,\"prerelease\":false}")"
          HTTP_CODE="$(printf '%s' "$BODY" | sed -n 's/^HTTP_CODE://p' | tail -1)"
          RESP="$(printf '%s' "$BODY" | sed '/^HTTP_CODE:/d')"
          echo "POST /releases -> HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID="$(printf '%s' "$RESP" | extract_id)"
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "409" ]; then
            # 409 = tag/release 已存在（workflow_dispatch 建的 tag 又触发了 push）。
            # 标记 duplicate 让后续 job 跳过，并取已存在 release 的 id。
            echo "Release $TAG already exists, fetching existing id..."
            RESP="$(curl -sS "$API/releases/tags/$TAG" -H "Authorization: token $TOKEN")"
            RELEASE_ID="$(printf '%s' "$RESP" | extract_id)"
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected response (HTTP $HTTP_CODE): $RESP"; exit 1
          fi

          if [ -z "$RELEASE_ID" ]; then echo "Failed to get release id from: $RESP"; exit 1; fi
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "Release id=$RELEASE_ID"

  build-macos:
    runs-on: macos-arm64
    needs: [prepare]
    if: needs.prepare.outputs.duplicate != 'true'
    outputs:
      dmg_name: ${{ steps.dmg.outputs.name }}
      dmg_sha256: ${{ steps.dmg.outputs.sha256 }}
    env:
      # 固定为 Flutter 中国镜像，与 build-windows 一致。runner 在国内，pub.dev
      # 不稳；不依赖 runner 全局配置可避免 pubspec.lock 的 url: 被改写漂移。
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
    steps:
      # 不用 actions/checkout：runner 在国内访问不了 gitea.com，克隆 action 会卡死。
      # 按 ref 名 fetch（而非 SHA）——服务器默认不允许 fetch 任意 SHA。
      - name: Checkout
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf .git
          git init -q .
          git -c "http.extraheader=Authorization: token $TOKEN" fetch --depth=1 --no-tags "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "$GITHUB_REF"
          git checkout -f FETCH_HEAD
          test -f pubspec.yaml || { echo "checkout failed: pubspec.yaml missing"; exit 1; }

      - name: Flutter sanity check
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "flutter not found in PATH"; exit 1; }
          flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: UTF-8 encoding check
        run: dart tool/check_utf8.dart

      - name: Build macOS (release)
        run: flutter build macos --release --build-name="${{ needs.prepare.outputs.version }}" --dart-define=GANG_CHAT_VERSION="${{ needs.prepare.outputs.version }}"

      - name: Package DMG
        id: dmg
        run: |
          APP="build/macos/Build/Products/Release/client.app"
          [ -d "$APP" ] || { echo "app bundle not found at $APP"; exit 1; }
          DMG="GangChat-${{ needs.prepare.outputs.version }}-macos.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Gang Chat" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          rm -rf "$STAGING"
          SHA256="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          echo "name=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG"
          echo "sha256=$SHA256"

      - name: Upload DMG to release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG="${{ steps.dmg.outputs.name }}"
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          curl -fsS -X POST "$API/releases/$RELEASE_ID/assets?name=$DMG" \
            -H "Authorization: token $TOKEN" \
            -F "attachment=@$DMG"
          echo "Uploaded $DMG"

  build-windows:
    runs-on: windows
    needs: [prepare]
    if: needs.prepare.outputs.duplicate != 'true'
    outputs:
      zip_name: ${{ steps.zip.outputs.name }}
      zip_sha256: ${{ steps.zip.outputs.sha256 }}
      installer_name: ${{ steps.installer.outputs.name }}
      installer_sha256: ${{ steps.installer.outputs.sha256 }}
    env:
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
    steps:
      # 不用 actions/checkout：runner 在国内访问不了 gitea.com，克隆 action 会卡死。
      # 必须开 core.longpaths，否则深层源文件（windows/ 下 CMake 文件等）因 260 字符
      # 路径限制 checkout 不全，后续 flutter build windows 的 CMake 会报错。
      # 每个 step 头部都补全 PATH：runner 启动时的 PATH 可能不完整，子进程继承残缺 PATH。
      - name: Checkout
        shell: powershell
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          if (Test-Path .git) { Remove-Item -Recurse -Force .git }
          git config --global core.longpaths true
          git init -q .
          # 按 ref 名 fetch（而非 SHA）——服务器默认不允许 fetch 任意 SHA
          git -c "http.extraheader=Authorization: token $env:TOKEN" fetch --depth=1 --no-tags "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY.git" $env:GITHUB_REF
          if ($LASTEXITCODE -ne 0) { Write-Error "git fetch failed"; exit 1 }
          git checkout -f FETCH_HEAD
          if ($LASTEXITCODE -ne 0) { Write-Error "git checkout failed"; exit 1 }
          # PowerShell step 不会因原生命令非零退出而失败，必须显式验证
          if (-not (Test-Path "pubspec.yaml")) { Write-Error "checkout failed: pubspec.yaml missing"; exit 1 }
          if (-not (Test-Path "windows")) { Write-Error "checkout failed: windows/ missing"; exit 1 }

      - name: Flutter sanity check
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          if (-not (Get-Command flutter -ErrorAction SilentlyContinue)) {
            Write-Error "flutter not found in PATH"; exit 1
          }
          flutter --version

      - name: Get dependencies
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          flutter pub get

      - name: UTF-8 encoding check
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          dart tool/check_utf8.dart

      # flutter pub get 会重置 pub cache 目录，每次 build 前重新下载解压 libwebrtc
      # cmake 的 ZIP 解压在 Windows 上有 bug，用 PowerShell Expand-Archive 更可靠
      # pub 解析出的实际版本可能和 pubspec.yaml 不同（transitive constraint 会拉高版本）
      - name: Setup libwebrtc
        shell: powershell
        run: |
          $pubCache = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.flutter-io.cn"
          $pkgDir = Get-ChildItem -Path $pubCache -Directory -Filter "flutter_webrtc-*" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $pkgDir) { Write-Error "flutter_webrtc not found in pub cache"; exit 1 }
          $thirdParty = Join-Path $pkgDir.FullName "third_party"
          $ver = $pkgDir.Name -replace "flutter_webrtc-", ""
          Write-Host "Found flutter_webrtc version: $ver at $thirdParty"

          if (Test-Path "$thirdParty\libwebrtc\include\libwebrtc.h") {
            Write-Host "libwebrtc already cached, skip"
            exit 0
          }

          Write-Host "Downloading libwebrtc.zip (v$ver) via proxy..."
          New-Item -ItemType Directory -Force -Path "$thirdParty\downloads" | Out-Null
          $url = "https://github.com/flutter-webrtc/flutter-webrtc/releases/download/v${ver}/libwebrtc.zip"
          curl.exe -L --connect-timeout 30 --retry 5 --retry-delay 10 -o "$thirdParty\downloads\libwebrtc.zip" $url
          if ($LASTEXITCODE -ne 0) { Write-Error "libwebrtc download failed: $url"; exit 1 }

          Write-Host "Extracting..."
          Expand-Archive -Path "$thirdParty\downloads\libwebrtc.zip" -DestinationPath $thirdParty -Force
          if (-not (Test-Path "$thirdParty\libwebrtc\include\libwebrtc.h")) {
            Write-Error "extraction failed: libwebrtc.h not found"
            exit 1
          }
          Write-Host "libwebrtc setup OK"

      - name: Build Windows (release)
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          flutter build windows --release --build-name="${{ needs.prepare.outputs.version }}" --dart-define=GANG_CHAT_VERSION="${{ needs.prepare.outputs.version }}"

      - name: Package ZIP
        id: zip
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $SRC = "build\windows\x64\runner\Release"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          $ZIP = "GangChat-$VERSION-windows.zip"
          Compress-Archive -Path "$SRC\*" -DestinationPath $ZIP
          $SHA256 = (Get-FileHash -Algorithm SHA256 -Path $ZIP).Hash.ToLowerInvariant()
          # 用 .NET 方法写入，避免 PS5 Out-File -Encoding utf8 带 BOM 导致 runner 解析失败
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "name=$ZIP`n")
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "sha256=$SHA256`n")
          Get-Item $ZIP | Select-Object Name, @{n='Size';e={'{0:N0} bytes' -f $_.Length}}
          Write-Host "sha256=$SHA256"

      - name: Ensure Inno Setup
        id: inno
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          $version = "6.7.3"
          $toolRoot = if ($env:RUNNER_TOOL_CACHE) {
            Join-Path $env:RUNNER_TOOL_CACHE "inno-setup\$version"
          } else {
            Join-Path $env:LOCALAPPDATA "GangChatBuildTools\InnoSetup-$version"
          }

          function Find-Iscc {
            $candidates = @(
              $env:GANG_INNO_SETUP_ISCC,
              (Join-Path $toolRoot "ISCC.exe"),
              "E:\Programs\InnoSetup\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 5\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 5\ISCC.exe"
            )
            $found = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
            if ($found) { return $found }
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Source }
            return $null
          }

          $ISCC = Find-Iscc
          if (-not $ISCC) {
            New-Item -ItemType Directory -Force -Path $toolRoot | Out-Null
            $installer = Join-Path ([IO.Path]::GetTempPath()) "innosetup-$version.exe"
            $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-$version.exe"
            Write-Host "Downloading Inno Setup $version..."
            curl.exe -L --connect-timeout 30 --retry 5 --retry-delay 10 -o $installer $url
            if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup download failed: $url"; exit 1 }

            $argumentSets = @(
              @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/CURRENTUSER', "/DIR=$toolRoot"),
              @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/DIR=$toolRoot")
            )
            $installed = $false
            foreach ($arguments in $argumentSets) {
              $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru
              if ($process.ExitCode -eq 0) {
                $installed = $true
                break
              }
              Write-Host "Inno Setup installer exited with $($process.ExitCode); retrying with fallback arguments..."
            }
            if (-not $installed) {
              Write-Error "Inno Setup installer failed"
              exit 1
            }
            $ISCC = Find-Iscc
          }

          if (-not $ISCC) {
            Write-Error "Inno Setup compiler (ISCC.exe) not found after installation."
            exit 1
          }
          Write-Host "Using Inno Setup compiler: $ISCC"
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "iscc=$ISCC`n")

      - name: Package Windows installer
        id: installer
        shell: powershell
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $SRC = "build\windows\x64\runner\Release"
          $OUT = "build\installer"
          $ICON = "windows\runner\resources\app_icon.ico"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          if (-not (Test-Path $ICON)) { Write-Error "installer icon not found at $ICON"; exit 1 }
          New-Item -ItemType Directory -Force -Path $OUT | Out-Null

          $ISCC = "${{ steps.inno.outputs.iscc }}"
          if (-not (Test-Path $ISCC)) {
            Write-Error "Inno Setup compiler not found at $ISCC"
            exit 1
          }

          $sourceDir = (Resolve-Path $SRC).Path
          $outputDir = (Resolve-Path $OUT).Path
          $iconFile = (Resolve-Path $ICON).Path
          & $ISCC "/DAppVersion=$VERSION" "/DSourceDir=$sourceDir" "/DOutputDir=$outputDir" "/DAppIconFile=$iconFile" "installer\gangchat.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup failed"; exit 1 }

          $EXE = Join-Path $OUT "GangChat-$VERSION-windows-x64-setup.exe"
          if (-not (Test-Path $EXE)) { Write-Error "installer not found at $EXE"; exit 1 }
          $SHA256 = (Get-FileHash -Algorithm SHA256 -Path $EXE).Hash.ToLowerInvariant()
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "name=$(Split-Path $EXE -Leaf)`n")
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "sha256=$SHA256`n")
          Get-Item $EXE | Select-Object Name, @{n='Size';e={'{0:N0} bytes' -f $_.Length}}
          Write-Host "sha256=$SHA256"

      - name: Upload ZIP to release
        shell: powershell
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          $ZIP = "${{ steps.zip.outputs.name }}"
          $API = "$env:GITHUB_SERVER_URL/api/v1/repos/$env:GITHUB_REPOSITORY"
          $RELEASE_ID = "${{ needs.prepare.outputs.release_id }}"
          # 用数组传参避免 PS 多行 backtick 续行解析问题
          $curlArgs = @('-fsS', '-X', 'POST',
            "$API/releases/$RELEASE_ID/assets?name=$ZIP",
            '-H', "Authorization: token $env:TOKEN",
            '-F', "attachment=@$ZIP")
          curl.exe @curlArgs
          Write-Host "Uploaded $ZIP"

      - name: Upload Windows installer to release
        shell: powershell
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:Path = "C:\Program Files\Git\mingw64\bin;C:\Program Files\Git\cmd;C:\Users\Administrator\flutter\bin;$env:Path"
          $EXE = "build\installer\${{ steps.installer.outputs.name }}"
          $API = "$env:GITHUB_SERVER_URL/api/v1/repos/$env:GITHUB_REPOSITORY"
          $RELEASE_ID = "${{ needs.prepare.outputs.release_id }}"
          $curlArgs = @('-fsS', '-X', 'POST',
            "$API/releases/$RELEASE_ID/assets?name=${{ steps.installer.outputs.name }}",
            '-H', "Authorization: token $env:TOKEN",
            '-F', "attachment=@$EXE")
          curl.exe @curlArgs
          Write-Host "Uploaded ${{ steps.installer.outputs.name }}"

  release:
    runs-on: macos-arm64
    needs: [prepare, build-macos, build-windows]
    if: needs.prepare.outputs.duplicate != 'true'
    steps:
      - name: Generate update manifest
        id: manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          WINDOWS_INSTALLER_NAME: ${{ needs.build-windows.outputs.installer_name }}
          WINDOWS_INSTALLER_SHA256: ${{ needs.build-windows.outputs.installer_sha256 }}
          WINDOWS_ZIP_NAME: ${{ needs.build-windows.outputs.zip_name }}
          WINDOWS_ZIP_SHA256: ${{ needs.build-windows.outputs.zip_sha256 }}
          MACOS_DMG_NAME: ${{ needs.build-macos.outputs.dmg_name }}
          MACOS_DMG_SHA256: ${{ needs.build-macos.outputs.dmg_sha256 }}
        run: |
          export RELEASE_BASE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          python3 - <<'PY'
          import datetime
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          release_base = os.environ["RELEASE_BASE"].rstrip("/")

          def asset(name_key, sha_key):
              name = os.environ[name_key]
              return {
                  "name": name,
                  "url": f"{release_base}/{name}",
                  "sha256": os.environ[sha_key],
              }

          windows_installer = asset(
              "WINDOWS_INSTALLER_NAME",
              "WINDOWS_INSTALLER_SHA256",
          )
          data = {
              "version": version,
              "latest_version": version,
              "minimum_supported_version": version,
              "release_date": datetime.datetime.utcnow().strftime("%Y/%m/%d"),
              "download_url": windows_installer["url"],
              "sha256": windows_installer["sha256"],
              "platforms": {
                  "windows-x64": {
                      "installer": windows_installer,
                      "zip": asset("WINDOWS_ZIP_NAME", "WINDOWS_ZIP_SHA256"),
                  },
                  "macos": {
                      "dmg": asset("MACOS_DMG_NAME", "MACOS_DMG_SHA256"),
                  },
              },
          }
          Path("app-update.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          echo "name=app-update.json" >> "$GITHUB_OUTPUT"
          cat app-update.json

      - name: Upload update manifest to release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: |
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          MANIFEST="${{ steps.manifest.outputs.name }}"
          curl -fsS -X POST "$API/releases/$RELEASE_ID/assets?name=$MANIFEST" \
            -H "Authorization: token $TOKEN" \
            -F "attachment=@$MANIFEST"
          echo "Uploaded $MANIFEST"

      - name: Publish release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: |
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          curl -fsS -X PATCH "$API/releases/$RELEASE_ID" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"draft":false}'
          echo "Published: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases"
