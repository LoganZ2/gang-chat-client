name: release

# 并行构建 macOS (.dmg) 和 Windows (.zip)，两者完成后统一创建 draft release 并上传产物。
# 触发方式：
#   - push 一个 v* tag（如 v1.2.0）
#   - Actions 页面手动触发，手填版本号

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，例如 1.2.0）'
        required: true

jobs:
  build-macos:
    runs-on: macos-arm64
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then echo "version is empty"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Flutter sanity check
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "flutter not found in PATH"; exit 1; }
          flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release --build-name="${{ steps.version.outputs.version }}"

      - name: Package DMG
        id: dmg
        run: |
          APP="build/macos/Build/Products/Release/client.app"
          [ -d "$APP" ] || { echo "app bundle not found at $APP"; exit 1; }
          DMG="GangChat-${{ steps.version.outputs.version }}-macos.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Gang Chat" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          rm -rf "$STAGING"
          echo "name=$DMG" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG"

      - name: Upload macOS artifact
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.dmg.outputs.name }}

  build-windows:
    runs-on: windows
    env:
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $VERSION = "${{ github.event.inputs.version }}"
          } else {
            $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          }
          if (-not $VERSION) { Write-Error "version is empty"; exit 1 }
          "version=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$VERSION"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved version: $VERSION"

      - name: Flutter sanity check
        shell: pwsh
        run: |
          if (-not (Get-Command flutter -ErrorAction SilentlyContinue)) {
            Write-Error "flutter not found in PATH"; exit 1
          }
          flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release --build-name="${{ steps.version.outputs.version }}"

      - name: Package ZIP
        id: zip
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $SRC = "build\windows\x64\runner\Release"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          $ZIP = "GangChat-$VERSION-windows.zip"
          Compress-Archive -Path "$SRC\*" -DestinationPath $ZIP
          "name=$ZIP" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Get-Item $ZIP | Select-Object Name, @{n='Size';e={'{0:N0} bytes' -f $_.Length}}

      - name: Upload Windows artifact
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ steps.zip.outputs.name }}

  release:
    runs-on: macos-arm64
    needs: [build-macos, build-windows]
    steps:
      - name: Download artifacts
        uses: https://github.com/actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts/
          merge-multiple: true

      - name: Create draft release & upload
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-macos.outputs.version }}
          TAG: ${{ needs.build-macos.outputs.tag }}
        run: |
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          DMG="GangChat-$VERSION-macos.dmg"
          ZIP="GangChat-$VERSION-windows.zip"

          echo "Creating draft release $TAG ..."
          RESP="$(curl -fsS -X POST "$API/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${GITHUB_SHA}\",\"name\":\"$TAG\",\"draft\":true,\"prerelease\":false}")"

          RELEASE_ID="$(printf '%s' "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
          if [ -z "$RELEASE_ID" ]; then echo "failed to parse release id from: $RESP"; exit 1; fi
          echo "Created release id=$RELEASE_ID"

          for FILE in "$DMG" "$ZIP"; do
            echo "Uploading $FILE ..."
            curl -fsS -X POST "$API/releases/$RELEASE_ID/assets?name=$FILE" \
              -H "Authorization: token $TOKEN" \
              -F "attachment=@artifacts/$FILE" >/dev/null
            echo "  done."
          done

          echo "Draft release ready: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases"
