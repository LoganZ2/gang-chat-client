name: release

# 在 macos-runner 上构建 macOS release，打成 .dmg，然后通过 Gitea release API
# 建一个 draft release 并挂上产物。两种触发方式：
#   - push 一个 v* tag（如 v1.2.0）
#   - 在 Actions 页面手动触发（workflow_dispatch），手填版本号
# 暂不做签名/公证（ad-hoc），用户首次打开需右键“打开”绕过 Gatekeeper。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，例如 1.2.0）'
        required: true

jobs:
  build-macos:
    runs-on: macos-arm64
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      # 手动触发用输入的版本号；tag 触发则从 tag 名去掉 v 前缀。
      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then echo "version is empty"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag v$VERSION)"

      # 环境自检：runner 是后台服务，可能不继承登录 shell 的 PATH。
      # 若这里报 "flutter not found"，需把 Flutter 路径加进 runner 的 PATH。
      - name: Flutter sanity check
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "flutter not found in PATH"; exit 1; }
          flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release --build-name="${{ steps.version.outputs.version }}"

      # 用系统自带 hdiutil 打 DMG，带一个指向 /Applications 的软链，方便拖拽安装。
      - name: Package DMG
        id: dmg
        run: |
          APP="build/macos/Build/Products/Release/client.app"
          [ -d "$APP" ] || { echo "app bundle not found at $APP"; exit 1; }
          DMG="GangChat-${{ steps.version.outputs.version }}-macos.dmg"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Gang Chat" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          rm -rf "$STAGING"
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$DMG" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG"

      # 建 draft release 并挂上 DMG。GITHUB_TOKEN 由 Gitea Actions 自动注入，
      # 对当前仓库默认有写权限。若返回 403，改用仓库 secret RELEASE_TOKEN（PAT）。
      - name: Create draft release & upload
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG="${{ steps.dmg.outputs.path }}"
          NAME="${{ steps.dmg.outputs.name }}"

          echo "Creating draft release $TAG ..."
          RESP="$(curl -fsS -X POST "$API/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${GITHUB_SHA}\",\"name\":\"$TAG\",\"draft\":true,\"prerelease\":false}")"

          RELEASE_ID="$(printf '%s' "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
          if [ -z "$RELEASE_ID" ]; then echo "failed to parse release id from: $RESP"; exit 1; fi
          echo "Created release id=$RELEASE_ID"

          echo "Uploading $NAME ..."
          curl -fsS -X POST "$API/releases/$RELEASE_ID/assets?name=$NAME" \
            -H "Authorization: token $TOKEN" \
            -F "attachment=@$DMG" >/dev/null
          echo "Done. Draft release ready for review at $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases"
