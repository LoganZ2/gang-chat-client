name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix, for example 1.2.0'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      android_version_code: ${{ steps.version.outputs.android_version_code }}
      tag: ${{ steps.version.outputs.tag }}
      released_at: ${{ steps.version.outputs.released_at }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then echo "version is empty"; exit 1; fi
          if ! printf '%s' "$VERSION" | grep -Eq \
            '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "version must be major.minor.patch: $VERSION"
            exit 1
          fi
          IFS='.' read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<< "$VERSION"
          if [ "${#VERSION_MAJOR}" -gt 4 ] || \
             [ "${#VERSION_MINOR}" -gt 3 ] || \
             [ "${#VERSION_PATCH}" -gt 3 ]; then
            echo "version components are too large for an Android version code: $VERSION"
            exit 1
          fi
          ANDROID_VERSION_CODE=$((
            10#$VERSION_MAJOR * 1000000 +
            10#$VERSION_MINOR * 1000 +
            10#$VERSION_PATCH
          ))
          if [ "$ANDROID_VERSION_CODE" -lt 1 ] || [ "$ANDROID_VERSION_CODE" -gt 2100000000 ]; then
            echo "Android version code must be between 1 and 2100000000: $ANDROID_VERSION_CODE"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "android_version_code=$ANDROID_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "released_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build-macos:
    runs-on: macos-latest
    needs: [prepare]
    outputs:
      signing_enabled: ${{ steps.macos_signing.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Flutter sanity check
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: UTF-8 encoding check
        run: dart tool/check_utf8.dart

      - name: Update release metadata
        run: |
          dart tool/update_release_metadata.dart \
            --version "${{ needs.prepare.outputs.version }}" \
            --released-at "${{ needs.prepare.outputs.released_at }}"

      - name: Resolve and prepare macOS Developer ID signing
        id: macos_signing
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          signing_secret_count=0
          missing_secrets=()
          for name in \
            MACOS_CERTIFICATE_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_SIGNING_IDENTITY \
            APPLE_NOTARY_KEY_BASE64 \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID; do
            if [ -n "${!name:-}" ]; then
              signing_secret_count=$((signing_secret_count + 1))
            else
              missing_secrets+=("$name")
            fi
          done

          if [ "$signing_secret_count" -eq 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned macOS release::Developer ID signing secrets are not configured; the DMG will be published unsigned and will not be notarized."
            {
              echo "### ⚠️ Unsigned macOS artifact"
              echo
              echo "Developer ID signing secrets are not configured."
              echo "The DMG will be built without Developer ID signing or Apple notarization."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$signing_secret_count" -ne 6 ]; then
            printf 'macOS signing is only partially configured; missing secret: %s\n' \
              "${missing_secrets[@]}" >&2
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          case "$MACOS_SIGNING_IDENTITY" in
            "Developer ID Application:"*) ;;
            *)
              echo "MACOS_SIGNING_IDENTITY must be a Developer ID Application identity" >&2
              exit 1
              ;;
          esac

          CERTIFICATE_PATH="$RUNNER_TEMP/gang-chat-developer-id.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/gang-chat-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$MACOS_CERTIFICATE_BASE64" \
            | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_NOTARY_KEY_BASE64" \
            | base64 -D > "$NOTARY_KEY_PATH"
          if [ ! -s "$CERTIFICATE_PATH" ] || [ ! -s "$NOTARY_KEY_PATH" ]; then
            echo "decoded macOS signing material is empty" >&2
            exit 1
          fi
          chmod 600 "$CERTIFICATE_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -F -- "$MACOS_SIGNING_IDENTITY"; then
            echo "configured Developer ID identity was not imported" >&2
            exit 1
          fi

          echo "MACOS_CERTIFICATE_PATH=$CERTIFICATE_PATH" >> "$GITHUB_ENV"
          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_NOTARY_KEY_ID=$APPLE_NOTARY_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_NOTARY_ISSUER_ID=$APPLE_NOTARY_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build macOS (release)
        run: flutter build macos --release --build-name="${{ needs.prepare.outputs.version }}"

      - name: Sign and verify macOS app
        if: steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/client.app"
          [ -d "$APP" ] || { echo "app bundle not found at $APP"; exit 1; }

          while IFS= read -r -d '' item; do
            if [ -f "$item" ] && ! file -b "$item" | grep -q 'Mach-O'; then
              continue
            fi
            codesign \
              --force \
              --timestamp \
              --options runtime \
              --preserve-metadata=identifier,requirements,entitlements \
              --sign "$MACOS_SIGNING_IDENTITY" \
              "$item"
          done < <(
            find "$APP/Contents" -depth \
              \( \
                -type d \( \
                  -name '*.framework' -o \
                  -name '*.xpc' -o \
                  -name '*.appex' -o \
                  -name '*.bundle' \
                \) -o \
                -type f \( -name '*.dylib' -o -perm -111 \) \
              \) -print0
          )

          codesign \
            --force \
            --timestamp \
            --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --display --verbose=4 "$APP" 2>&1

      - name: Package DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/client.app"
          [ -d "$APP" ] || { echo "app bundle not found at $APP"; exit 1; }
          DMG="GangChat_v${{ needs.prepare.outputs.version }}.dmg"
          STAGING="$(mktemp -d)"
          trap 'rm -rf "$STAGING"' EXIT
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Gang Chat" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          echo "name=$DMG" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG"

      - name: Sign, notarize, and staple macOS DMG
        if: steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.name }}"
          RESULT="$RUNNER_TEMP/gang-chat-notary-result.json"
          LOG="$RUNNER_TEMP/gang-chat-notary-log.json"

          codesign \
            --force \
            --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$DMG"
          codesign --verify --verbose=2 "$DMG"

          xcrun notarytool submit "$DMG" \
            --key "$APPLE_NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait \
            --output-format json | tee "$RESULT"

          STATUS="$(plutil -extract status raw "$RESULT")"
          SUBMISSION_ID="$(plutil -extract id raw "$RESULT")"
          if [ "$STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$APPLE_NOTARY_KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              "$LOG" || true
            [ ! -f "$LOG" ] || cat "$LOG"
            echo "Apple notarization failed with status: $STATUS" >&2
            exit 1
          fi

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          codesign --verify --verbose=2 "$DMG"
          spctl --assess \
            --type open \
            --context context:primary-signature \
            --verbose=2 \
            "$DMG"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.dmg.outputs.name }}
          if-no-files-found: error

      - name: Clean up macOS signing material
        if: always()
        shell: bash
        run: |
          if [ -n "${MACOS_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$MACOS_KEYCHAIN_PATH" || true
          fi
          for path in \
            "${MACOS_CERTIFICATE_PATH:-}" \
            "${APPLE_NOTARY_KEY_PATH:-}" \
            "$RUNNER_TEMP/gang-chat-notary-result.json" \
            "$RUNNER_TEMP/gang-chat-notary-log.json"; do
            if [ -n "$path" ]; then
              rm -f "$path"
            fi
          done

  build-windows:
    runs-on: windows-latest
    needs: [prepare]
    outputs:
      signing_enabled: ${{ steps.windows_signing.outputs.enabled }}
    steps:
      - name: Enable long paths
        shell: powershell
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Setup NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Flutter sanity check
        shell: powershell
        run: flutter --version

      - name: Get dependencies
        shell: powershell
        run: flutter pub get

      - name: UTF-8 encoding check
        shell: powershell
        run: dart tool/check_utf8.dart

      - name: Update release metadata
        shell: powershell
        run: |
          dart tool/update_release_metadata.dart `
            --version "${{ needs.prepare.outputs.version }}" `
            --released-at "${{ needs.prepare.outputs.released_at }}"

      - name: Resolve and prepare Windows Authenticode signing
        id: windows_signing
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $signingSecretNames = @(
            "WINDOWS_CERTIFICATE_BASE64",
            "WINDOWS_CERTIFICATE_PASSWORD"
          )
          $configuredSecrets = @(
            $signingSecretNames | Where-Object {
              -not [string]::IsNullOrWhiteSpace(
                [Environment]::GetEnvironmentVariable($_)
              )
            }
          )
          if ($configuredSecrets.Count -eq 0) {
            "enabled=false" |
              Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning (
              "Authenticode signing secrets are not configured; " +
              "Windows artifacts will be published unsigned."
            )
            @(
              "### WARNING: Unsigned Windows artifacts"
              ""
              "Authenticode signing secrets are not configured."
              "GangChat.exe, the installer, and the portable ZIP will be published unsigned."
            ) | Out-File `
              -FilePath $env:GITHUB_STEP_SUMMARY `
              -Encoding utf8 `
              -Append
            exit 0
          }
          if ($configuredSecrets.Count -ne $signingSecretNames.Count) {
            $missingSecrets = @(
              $signingSecretNames | Where-Object {
                [string]::IsNullOrWhiteSpace(
                  [Environment]::GetEnvironmentVariable($_)
                )
              }
            )
            throw (
              "Windows signing is only partially configured; missing secret: " +
              ($missingSecrets -join ", ")
            )
          }

          "enabled=true" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $certificatePath = Join-Path $env:RUNNER_TEMP "gang-chat-authenticode.pfx"
          try {
            $certificateBytes = [Convert]::FromBase64String(
              $env:WINDOWS_CERTIFICATE_BASE64
            )
          } catch {
            throw "WINDOWS_CERTIFICATE_BASE64 is not valid base64"
          }
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
          if ((Get-Item $certificatePath).Length -eq 0) {
            throw "decoded Windows signing certificate is empty"
          }

          $password = ConvertTo-SecureString `
            $env:WINDOWS_CERTIFICATE_PASSWORD `
            -AsPlainText `
            -Force
          $imported = @(
            Import-PfxCertificate `
              -FilePath $certificatePath `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password $password `
              -Exportable:$false
          )
          $certificate = $imported |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1
          if ($null -eq $certificate) {
            throw "the Windows signing certificate has no private key"
          }

          $codeSigningOid = "1.3.6.1.5.5.7.3.3"
          $hasCodeSigningUsage = $false
          foreach ($extension in $certificate.Extensions) {
            if (
              $extension -is
              [System.Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]
            ) {
              foreach ($usage in $extension.EnhancedKeyUsages) {
                if ($usage.Value -eq $codeSigningOid) {
                  $hasCodeSigningUsage = $true
                }
              }
            }
          }
          if (-not $hasCodeSigningUsage) {
            throw "the Windows certificate is not valid for code signing"
          }
          $now = Get-Date
          if ($certificate.NotBefore -gt $now -or $certificate.NotAfter -le $now) {
            throw "the Windows code-signing certificate is not currently valid"
          }

          $kitsRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signTool = Get-ChildItem `
              -Path $kitsRoot `
              -Recurse `
              -Filter signtool.exe `
              -File |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signTool) {
            throw "signtool.exe was not found under $kitsRoot"
          }

          "WINDOWS_CERTIFICATE_PATH=$certificatePath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_SIGNTOOL_PATH=$($signTool.FullName)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_TIMESTAMP_URL=http://timestamp.digicert.com" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Imported code-signing certificate: $($certificate.Subject)"

      - name: Build Windows (release)
        shell: powershell
        run: flutter build windows --release --build-name="${{ needs.prepare.outputs.version }}"

      - name: Prepare Windows package files
        id: windows_package
        shell: powershell
        run: |
          $SRC = "build\windows\x64\runner\Release"
          $STAGING = "build\windows\x64\runner\Package"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          if (-not (Test-Path (Join-Path $SRC "GangChat.exe"))) { Write-Error "build executable not found at $SRC\GangChat.exe"; exit 1 }
          if (Test-Path $STAGING) { Remove-Item -Recurse -Force $STAGING }
          New-Item -ItemType Directory -Force -Path $STAGING | Out-Null
          Copy-Item -Path "$SRC\*" -Destination $STAGING -Recurse -Force
          $legacyExecutable = Join-Path $STAGING "client.exe"
          if (Test-Path $legacyExecutable) {
            Remove-Item -LiteralPath $legacyExecutable -Force
          }

          $excludePatterns = @("*.pdb", "*.ilk", "*.exp", "*.lib", "*.iobj", "*.ipdb")
          foreach ($pattern in $excludePatterns) {
            Get-ChildItem -Path $STAGING -Recurse -File -Filter $pattern | Remove-Item -Force
          }
          if (-not (Test-Path (Join-Path $STAGING "GangChat.exe"))) { Write-Error "staged executable not found at $STAGING\GangChat.exe"; exit 1 }

          $totalBytes = (Get-ChildItem -Path $STAGING -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host ("Staged Windows runtime size: {0:N0} bytes" -f $totalBytes)
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "dir=$STAGING`n")

      - name: Sign and verify Windows application
        if: steps.windows_signing.outputs.enabled == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $executable = Join-Path `
            "${{ steps.windows_package.outputs.dir }}" `
            "GangChat.exe"
          if (-not (Test-Path $executable)) {
            throw "Windows executable not found at $executable"
          }

          & $env:WINDOWS_SIGNTOOL_PATH sign `
            /fd SHA256 `
            /td SHA256 `
            /tr $env:WINDOWS_TIMESTAMP_URL `
            /s My `
            /sha1 $env:WINDOWS_CERTIFICATE_THUMBPRINT `
            /d "Gang Chat" `
            /du "https://ky-z.com/gang-chat/home/" `
            $executable
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed for $executable"
          }

          & $env:WINDOWS_SIGNTOOL_PATH verify /pa /all /v $executable
          if ($LASTEXITCODE -ne 0) {
            throw "Authenticode verification failed for $executable"
          }
          $signature = Get-AuthenticodeSignature $executable
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "Windows executable signature status is $($signature.Status)"
          }

      - name: Package NSIS installer
        id: installer
        shell: powershell
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $SRC = "${{ steps.windows_package.outputs.dir }}"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          if (-not (Test-Path (Join-Path $SRC "GangChat.exe"))) { Write-Error "build executable not found at $SRC"; exit 1 }
          $MAKENSIS = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $MAKENSIS)) { Write-Error "makensis.exe not found at $MAKENSIS"; exit 1 }
          $VERSION_QUAD = "$VERSION.0"
          $INSTALLER = "GangChat_v$VERSION.exe"
          $ROOT = (Resolve-Path ".").Path
          $SRC_ABS = (Resolve-Path $SRC).Path
          $OUT_ABS = Join-Path $ROOT $INSTALLER
          $makensisArguments = @(
            "/INPUTCHARSET"
            "UTF8"
            "/DAPP_VERSION=$VERSION"
            "/DAPP_VERSION_QUAD=$VERSION_QUAD"
            "/DPROJECT_ROOT=$ROOT"
            "/DSOURCE_DIR=$SRC_ABS"
            "/DOUTPUT_FILE=$OUT_ABS"
          )
          $signingEnabled = (
            "${{ steps.windows_signing.outputs.enabled }}" -eq "true"
          )
          if ($signingEnabled) {
            $makensisArguments += @(
              "/DSIGNTOOL_PATH=$env:WINDOWS_SIGNTOOL_PATH"
              "/DSIGN_CERT_THUMBPRINT=$env:WINDOWS_CERTIFICATE_THUMBPRINT"
              "/DSIGN_TIMESTAMP_URL=$env:WINDOWS_TIMESTAMP_URL"
            )
          }
          $makensisArguments += "installer\windows\gang_chat.nsi"
          & $MAKENSIS @makensisArguments
          if ($LASTEXITCODE -ne 0) { Write-Error "makensis failed"; exit 1 }
          if (-not (Test-Path $INSTALLER)) { Write-Error "installer not created: $INSTALLER"; exit 1 }

          if ($signingEnabled) {
            & $env:WINDOWS_SIGNTOOL_PATH verify /pa /all /v $INSTALLER
            if ($LASTEXITCODE -ne 0) {
              throw "Authenticode verification failed for $INSTALLER"
            }
            $signature = Get-AuthenticodeSignature $INSTALLER
            if (
              $signature.Status -ne
              [System.Management.Automation.SignatureStatus]::Valid
            ) {
              throw "Windows installer signature status is $($signature.Status)"
            }
          }

          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "name=$INSTALLER`n")
          Get-Item $INSTALLER | Select-Object Name, @{n='Size';e={'{0:N0} bytes' -f $_.Length}}

      - name: Package Windows zip
        id: windows_zip
        shell: powershell
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $SRC = "${{ steps.windows_package.outputs.dir }}"
          if (-not (Test-Path $SRC)) { Write-Error "build output not found at $SRC"; exit 1 }
          if (-not (Test-Path (Join-Path $SRC "GangChat.exe"))) { Write-Error "build executable not found at $SRC"; exit 1 }
          $ZIP = "GangChat-$VERSION-windows.zip"
          if (Test-Path $ZIP) { Remove-Item -Force $ZIP }
          Compress-Archive -Path "$SRC\*" -DestinationPath $ZIP -Force
          if (-not (Test-Path $ZIP)) { Write-Error "zip not created: $ZIP"; exit 1 }
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "name=$ZIP`n")
          Get-Item $ZIP | Select-Object Name, @{n='Size';e={'{0:N0} bytes' -f $_.Length}}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            ${{ steps.installer.outputs.name }}
            ${{ steps.windows_zip.outputs.name }}
          if-no-files-found: error

      - name: Clean up Windows signing material
        if: always()
        shell: powershell
        run: |
          if (-not [string]::IsNullOrWhiteSpace(
            $env:WINDOWS_CERTIFICATE_THUMBPRINT
          )) {
            $certificate = Join-Path `
              Cert:\CurrentUser\My `
              $env:WINDOWS_CERTIFICATE_THUMBPRINT
            if (Test-Path $certificate) {
              Remove-Item -LiteralPath $certificate -Force
            }
          }
          if (
            -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PATH) -and
            (Test-Path -LiteralPath $env:WINDOWS_CERTIFICATE_PATH)
          ) {
            Remove-Item -LiteralPath $env:WINDOWS_CERTIFICATE_PATH -Force
          }

  build-android:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Flutter sanity check
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: UTF-8 encoding check
        run: dart tool/check_utf8.dart

      - name: Update release metadata
        run: |
          dart tool/update_release_metadata.dart \
            --version "${{ needs.prepare.outputs.version }}" \
            --released-at "${{ needs.prepare.outputs.released_at }}"

      - name: Prepare Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "required GitHub Actions secret is missing: $name" >&2
              exit 1
            fi
          done

          KEYSTORE_PATH="$RUNNER_TEMP/gang-chat-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "decoded Android keystore is empty" >&2
            exit 1
          fi
          chmod 600 "$KEYSTORE_PATH"
          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build Android APK (release)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name="${{ needs.prepare.outputs.version }}" \
            --build-number="${{ needs.prepare.outputs.android_version_code }}"

      - name: Prepare and verify Android APK
        id: android_apk
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="build/app/outputs/flutter-apk/app-release.apk"
          APK="GangChat_v${{ needs.prepare.outputs.version }}.apk"
          if [ ! -f "$SOURCE" ]; then
            echo "release APK not found at $SOURCE" >&2
            exit 1
          fi
          cp "$SOURCE" "$APK"

          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" \
            -mindepth 2 -maxdepth 2 -type f -name apksigner \
            | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found under $ANDROID_SDK_ROOT/build-tools" >&2
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          echo "name=$APK" >> "$GITHUB_OUTPUT"
          sha256sum "$APK"
          ls -lh "$APK"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.android_apk.outputs.name }}
          if-no-files-found: error

      - name: Clean up Android signing material
        if: always()
        shell: bash
        run: |
          if [ -n "${ANDROID_KEYSTORE_PATH:-}" ]; then
            rm -f "$ANDROID_KEYSTORE_PATH"
          fi

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-macos, build-windows, build-android]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release signing status
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Artifact signing status"
            echo
            if [ "${{ needs['build-windows'].outputs.signing_enabled }}" = "true" ]; then
              echo "- ✅ Windows: Authenticode signed and verified."
            else
              echo "- ⚠️ Windows: unsigned; Authenticode secrets were not configured."
            fi
            if [ "${{ needs['build-macos'].outputs.signing_enabled }}" = "true" ]; then
              echo "- ✅ macOS: Developer ID signed, notarized, and stapled."
            else
              echo "- ⚠️ macOS: unsigned and not notarized; Apple signing secrets were not configured."
            fi
            echo "- ✅ Android: release-key signed and verified."
          } | tee release-signing-status.md
          cat release-signing-status.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          body_path: release-signing-status.md
          files: release-assets/*
