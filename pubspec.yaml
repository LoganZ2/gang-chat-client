name: client
description: Gang Chat client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  # Versions are pinned exactly (no ^) so `flutter pub get` never silently
  # bumps a dependency. To intentionally upgrade one, bump it here and run
  # `flutter pub get`, then commit the pubspec.yaml + pubspec.lock together.
  cupertino_icons: 1.0.9
  flutter_secure_storage: 10.3.1
  http: 1.6.0
  window_manager: 0.5.1
  livekit_client: 2.7.0
  # Pinned to match livekit_client 2.7.0's transitive constraint; used for the
  # desktop screen-share source picker (desktopCapturer.getSources). 1.4.0 routes
  # macOS full-screen capture through ScreenCaptureKit, which fixes the sheared
  # frame stride on Retina displays that the old RTCDesktopCapturer produced.
  flutter_webrtc: 1.4.0
  file_selector: 1.1.0
  archive: 4.0.9
  path_provider: 2.1.5
  record: 7.1.0
  audioplayers: 6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

dependency_overrides:
  audioplayers_windows:
    path: third_party/audioplayers_windows

flutter:
  uses-material-design: true
  assets:
    - assets/config/app_config.json
